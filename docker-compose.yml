services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "rootpassword"
      MYSQL_DATABASE: "campus_tasks"
      MYSQL_USER: "campus_user"
      MYSQL_PASSWORD: "campus_password"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn campus_backend.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: "docker-local-secret-key-for-campus-task-2026"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8002,http://127.0.0.1:8002"
      MYSQL_DATABASE: "campus_tasks"
      MYSQL_USER: "campus_user"
      MYSQL_PASSWORD: "campus_password"
      MYSQL_HOST: "db"
      MYSQL_PORT: "3306"
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: