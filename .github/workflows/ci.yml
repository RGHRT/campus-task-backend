name: Django CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_ROOT_HOST: "%"
          MYSQL_DATABASE: campus_tasks
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    env:
      DJANGO_SECRET_KEY: github-actions-test-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver

      MYSQL_DATABASE: campus_tasks
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: campus-task-backend:ci

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install black ruff

      - name: Check code formatting with Black
        run: |
          python -m black --check api campus_backend manage.py

      - name: Check code quality with Ruff
        run: |
          python -m ruff check api campus_backend manage.py

      - name: Run Django system checks
        run: |
          python manage.py check

      - name: Run automated tests
        run: |
          python manage.py test api

      - name: Validate OpenAPI schema
        run: |
          python manage.py spectacular --file schema-ci.yaml --validate